<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผลงาน Video — PM Promo</title>
<link rel="icon" type="image/png" href="Logo4.png">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans:['Kanit','sans-serif'], mono:['Space Mono','monospace'] },
        colors: { brand:{ bg:'#060a06', card:'#080e08', border:'#162016', text:'#e4ede4', muted:'#6e866e', primary:'#3aab22', light:'#6fcc56', primarybg:'rgba(58,171,34,0.10)' } }
      }
    }
  }
</script>
</head>
<body class="bg-brand-bg text-brand-text font-sans antialiased">

<nav class="fixed top-0 w-full z-50 bg-brand-bg/80 backdrop-blur-md border-b border-brand-border">
  <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="index.html"><img id="nav-logo" src="Logo4.png" class="h-12" alt="PM Promo"></a>
    <div class="hidden md:flex items-center gap-8 font-mono text-sm text-brand-muted">
      <a href="artwork.html" class="hover:text-brand-light transition-colors">Artworks</a>
      <a href="video.html" class="text-brand-light">Videos</a>
      <a href="seo.html" class="hover:text-brand-light transition-colors">SEO Results</a>
      <a href="blog.html" class="hover:text-brand-light transition-colors">Blog</a>
    </div>
    <a href="index.html#contact" class="hidden md:inline-flex bg-brand-primarybg border border-brand-primary/30 text-brand-light px-5 py-2 rounded-lg font-medium hover:bg-brand-primary hover:text-white transition-all duration-300">Get in touch</a>
  </div>
</nav>

<div class="pt-16">
  <div class="relative py-16 px-6 border-b border-brand-border overflow-hidden">
    <div class="absolute inset-0 bg-grid-pattern bg-[size:40px_40px] opacity-30"></div>
    <div class="relative max-w-5xl mx-auto">
      <div class="font-mono text-brand-primary text-xs tracking-widest uppercase mb-3">// Portfolio</div>
      <h1 class="text-4xl font-bold text-white mb-3">ผลงาน Video</h1>
      <p class="text-brand-muted">วิดีโอโฆษณา, Reels, TikTok และ Corporate Video</p>
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-6 py-12">
    <div class="flex gap-3 flex-wrap mb-10">
      <button onclick="filterVideo('all',this)" class="filter-btn active font-mono text-xs px-4 py-2 rounded-full border border-brand-primary/30 bg-brand-primarybg text-brand-light">ทั้งหมด</button>
      <button onclick="filterVideo('วิดีโอโฆษณา',this)" class="filter-btn font-mono text-xs px-4 py-2 rounded-full border border-brand-border text-brand-muted hover:border-brand-primary/30 hover:text-brand-light transition-colors">วิดีโอโฆษณา</button>
      <button onclick="filterVideo('Reels / TikTok',this)" class="filter-btn font-mono text-xs px-4 py-2 rounded-full border border-brand-border text-brand-muted hover:border-brand-primary/30 hover:text-brand-light transition-colors">Reels / TikTok</button>
      <button onclick="filterVideo('YouTube',this)" class="filter-btn font-mono text-xs px-4 py-2 rounded-full border border-brand-border text-brand-muted hover:border-brand-primary/30 hover:text-brand-light transition-colors">YouTube</button>
      <button onclick="filterVideo('Corporate Video',this)" class="filter-btn font-mono text-xs px-4 py-2 rounded-full border border-brand-border text-brand-muted hover:border-brand-primary/30 hover:text-brand-light transition-colors">Corporate</button>
    </div>

    <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    <div id="empty-state" class="hidden text-center py-20 text-brand-muted">
      <i class="ti ti-video-off text-4xl mb-3 block"></i>
      <p>ยังไม่มีผลงาน Video</p>
      <p class="text-sm mt-1">เพิ่มผลงานได้ที่ <a href="/admin/#/collections/videos" class="text-brand-light underline">Admin Panel</a></p>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80">
  <div class="relative w-full max-w-3xl mx-4">
    <button onclick="closeModal()" class="absolute -top-10 right-0 text-white text-3xl hover:text-brand-light"><i class="ti ti-x"></i></button>
    <div class="aspect-video">
      <iframe id="modal-iframe" src="" class="w-full h-full rounded-xl" allowfullscreen></iframe>
    </div>
  </div>
</div>

<footer class="border-t border-brand-border py-8 px-6 text-center text-brand-muted font-mono text-xs">
  © 2025 PM Promo Marketing. All rights reserved.
</footer>

<script>
let allVideos = [];

function getYouTubeId(url) {
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
  return m ? m[1] : null;
}
function getEmbedUrl(url) {
  const ytId = getYouTubeId(url);
  if (ytId) return `https://www.youtube.com/embed/${ytId}`;
  return url;
}
function getThumbnail(item) {
  if (item.thumbnail) return item.thumbnail;
  const ytId = getYouTubeId(item.video_url || '');
  if (ytId) return `https://img.youtube.com/vi/${ytId}/hqdefault.jpg`;
  return 'https://images.unsplash.com/photo-1536240478700-b869070f9279?w=600&auto=format&fit=crop';
}

async function loadVideos() {
  try {
    const res = await fetch('/_videos/index.json');
    if (!res.ok) throw new Error();
    allVideos = await res.json();
  } catch {
    allVideos = window.__VIDEOS__ || [];
  }
  renderVideos(allVideos);
}

function renderVideos(items) {
  const grid = document.getElementById('video-grid');
  const empty = document.getElementById('empty-state');
  if (!items.length) { grid.classList.add('hidden'); empty.classList.remove('hidden'); return; }
  grid.classList.remove('hidden'); empty.classList.add('hidden');
  grid.innerHTML = items.map(item => `
    <div class="group bg-brand-card border border-brand-border rounded-2xl overflow-hidden hover:border-brand-primary/40 transition-all duration-300 cursor-pointer" onclick="openModal('${getEmbedUrl(item.video_url||'')}')">
      <div class="aspect-video relative overflow-hidden">
        <img src="${getThumbnail(item)}" alt="${item.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 opacity-70 group-hover:opacity-90">
        <div class="absolute inset-0 flex items-center justify-center">
          <div class="w-14 h-14 rounded-full bg-brand-primary/80 flex items-center justify-center group-hover:bg-brand-primary transition-colors">
            <i class="ti ti-player-play text-white text-2xl ml-1"></i>
          </div>
        </div>
      </div>
      <div class="p-4">
        <span class="font-mono text-xs text-brand-primary">${item.category||''}</span>
        <h3 class="text-brand-text font-semibold mt-1 mb-1">${item.title}</h3>
        ${item.client ? `<p class="text-brand-muted text-sm">${item.client}</p>` : ''}
        ${item.description ? `<p class="text-brand-muted text-sm mt-2 line-clamp-2">${item.description}</p>` : ''}
      </div>
    </div>
  `).join('');
}

function filterVideo(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active','bg-brand-primarybg','border-brand-primary/30','text-brand-light'));
  btn.classList.add('active','bg-brand-primarybg','border-brand-primary/30','text-brand-light');
  const filtered = cat === 'all' ? allVideos : allVideos.filter(v => v.category === cat);
  renderVideos(filtered);
}

function openModal(url) {
  document.getElementById('modal-iframe').src = url;
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modal').classList.add('flex');
}
function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  document.getElementById('modal').classList.remove('flex');
  document.getElementById('modal-iframe').src = '';
}

loadVideos();

async function loadSettings() {
  try {
    const res = await fetch('/_data/settings.json');
    if (!res.ok) return;
    const s = await res.json();
    if (s.logo) document.getElementById('nav-logo').src = s.logo;
  } catch {}
}
loadSettings();
</script>
</body>
</html>
