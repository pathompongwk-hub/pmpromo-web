<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผลงาน SEO — PM Promo</title>
<link rel="icon" type="image/png" href="Logo4.png">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans:['Kanit','sans-serif'], mono:['Space Mono','monospace'] },
        colors: { brand:{ bg:'#060a06', card:'#080e08', border:'#162016', text:'#e4ede4', muted:'#6e866e', primary:'#3aab22', light:'#6fcc56', primarybg:'rgba(58,171,34,0.10)' } }
      }
    }
  }
</script>
</head>
<body class="bg-brand-bg text-brand-text font-sans antialiased">

<nav class="fixed top-0 w-full z-50 bg-brand-bg/80 backdrop-blur-md border-b border-brand-border">
  <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="index.html"><img id="nav-logo" src="Logo4.png" class="h-12" alt="PM Promo"></a>
    <div class="hidden md:flex items-center gap-8 font-mono text-sm text-brand-muted">
      <a href="artwork.html" class="hover:text-brand-light transition-colors">Artworks</a>
      <a href="video.html" class="hover:text-brand-light transition-colors">Videos</a>
      <a href="seo.html" class="text-brand-light">SEO Results</a>
      <a href="blog.html" class="hover:text-brand-light transition-colors">Blog</a>
    </div>
    <a href="index.html#contact" class="hidden md:inline-flex bg-brand-primarybg border border-brand-primary/30 text-brand-light px-5 py-2 rounded-lg font-medium hover:bg-brand-primary hover:text-white transition-all duration-300">Get in touch</a>
  </div>
</nav>

<div class="pt-16">
  <div class="relative py-16 px-6 border-b border-brand-border overflow-hidden">
    <div class="absolute inset-0 bg-grid-pattern bg-[size:40px_40px] opacity-30"></div>
    <div class="relative max-w-5xl mx-auto">
      <div class="font-mono text-brand-primary text-xs tracking-widest uppercase mb-3">// Portfolio</div>
      <h1 class="text-4xl font-bold text-white mb-3">ผลงาน SEO</h1>
      <p class="text-brand-muted">ผลลัพธ์จริงจาก Google Search Console — ตัวเลขที่วัดได้</p>
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-6 py-12">
    <div id="seo-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    <div id="empty-state" class="hidden text-center py-20 text-brand-muted">
      <i class="ti ti-chart-bar-off text-4xl mb-3 block"></i>
      <p>ยังไม่มีผลงาน SEO</p>
      <p class="text-sm mt-1">เพิ่มผลงานได้ที่ <a href="/admin/#/collections/seo_results" class="text-brand-light underline">Admin Panel</a></p>
    </div>
  </div>
</div>

<footer class="border-t border-brand-border py-8 px-6 text-center text-brand-muted font-mono text-xs">
  © 2025 PM Promo Marketing. All rights reserved.
</footer>

<script>
async function loadSEO() {
  let items = [];
  try {
    const res = await fetch('/_seo/index.json');
    if (!res.ok) throw new Error();
    items = await res.json();
  } catch {
    items = window.__SEO__ || [];
  }
  const grid = document.getElementById('seo-grid');
  const empty = document.getElementById('empty-state');
  if (!items.length) { grid.classList.add('hidden'); empty.classList.remove('hidden'); return; }
  grid.classList.remove('hidden'); empty.classList.add('hidden');
  grid.innerHTML = items.map(item => `
    <div class="bg-brand-card border border-brand-border rounded-2xl p-6 hover:border-brand-primary/40 transition-all duration-300">
      <div class="flex items-start justify-between mb-4">
        <div>
          <div class="font-mono text-xs text-brand-primary mb-1">// SEO Result</div>
          <h3 class="text-white font-semibold text-lg">${item.title}</h3>
          <p class="text-brand-muted text-sm mt-1">Keyword: <span class="text-brand-light font-mono">"${item.keyword||''}"</span></p>
        </div>
        <div class="w-10 h-10 rounded-xl bg-brand-primarybg flex items-center justify-center text-brand-primary flex-shrink-0">
          <i class="ti ti-trending-up text-xl"></i>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-3 mb-4">
        <div class="bg-[#0a120a] rounded-xl p-3 text-center border border-brand-border">
          <div class="font-mono text-lg font-bold text-red-400">${item.rank_before||'-'}</div>
          <div class="text-xs text-brand-muted mt-1">อันดับก่อน</div>
        </div>
        <div class="bg-[#0a120a] rounded-xl p-3 text-center border border-brand-border flex items-center justify-center">
          <i class="ti ti-arrow-right text-brand-primary text-xl"></i>
        </div>
        <div class="bg-[#0a120a] rounded-xl p-3 text-center border border-brand-border">
          <div class="font-mono text-lg font-bold text-brand-light">${item.rank_after||'-'}</div>
          <div class="text-xs text-brand-muted mt-1">อันดับหลัง</div>
        </div>
      </div>

      ${item.traffic_increase ? `
      <div class="flex items-center gap-2 bg-brand-primarybg border border-brand-primary/20 rounded-lg px-4 py-2 mb-4">
        <i class="ti ti-trending-up text-brand-primary"></i>
        <span class="text-brand-light font-mono font-bold">${item.traffic_increase}</span>
        <span class="text-brand-muted text-sm">Traffic เพิ่มขึ้น</span>
      </div>` : ''}

      ${item.description ? `<p class="text-brand-muted text-sm leading-relaxed mb-4">${item.description}</p>` : ''}

      ${item.screenshot ? `
      <div class="rounded-xl overflow-hidden border border-brand-border">
        <img src="${item.screenshot}" alt="GSC Screenshot" class="w-full">
      </div>` : ''}
    </div>
  `).join('');
}

loadSEO();

async function loadSettings() {
  try {
    const res = await fetch('/_data/settings.json');
    if (!res.ok) return;
    const s = await res.json();
    if (s.logo) document.getElementById('nav-logo').src = s.logo;
  } catch {}
}
loadSettings();
</script>
</body>
</html>
